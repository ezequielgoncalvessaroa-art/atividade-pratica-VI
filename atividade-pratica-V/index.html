<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
    >

    <style>
        :root {
            --pico-primary: #2563eb;
            --pico-primary-hover: #1d4ed8;
            --pico-primary-focus: rgba(37, 99, 235, 0.25);
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(
                135deg,
                #1e3a8a 0%,
                #2563eb 50%,
                #3b82f6 100%
            );
            padding: 2rem;
        }

        .login-card {
            background: white;
            max-width: 450px;
            width: 100%;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        h1 {
            text-align: center;
            margin-bottom: 0.5rem;
            color: #1e293b;
        }

        .subtitle {
            text-align: center;
            color: #64748b;
            margin-bottom: 2rem;
        }

        input {
            border-radius: 12px !important;
        }

        button {
            width: 100%;
            border-radius: 12px;
            margin-top: 1rem;
            font-weight: 600;
        }

        .links {
            text-align: center;
            margin-top: 1rem;
        }

        .links a {
            text-decoration: none;
            font-weight: 600;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .register {
            margin-top: 1.5rem;
            color: #64748b;
        }

        @media (max-width: 576px) {
            body {
                padding: 1rem;
            }

            .login-card {
                padding: 1.5rem;
            }
        }
    </style>
</head>

<body>

    <main class="login-card">

        <h1>Entrar</h1>
        <p class="subtitle">
            Acesse sua conta para continuar.
        </p>

        <form action="feed.html" method="get">

            <label for="email">E-mail</label>
            <input
                id="email"
                type="email"
                name="email"
                placeholder="Digite seu e-mail"
                required
            >

            <label for="senha">Senha</label>
            <input
                id="senha"
                type="password"
                name="senha"
                placeholder="Digite sua senha"
                required
            >

            <button type="submit">
                Entrar
            </button>

        </form>

        <div class="links">
            <a href="#">
                Esqueceu sua senha?
            </a>

            <div class="register">
                Não tem uma conta?
                <br>
                <a href="cadastro.html">
                    Cadastre-se
                </a>
            </div>
        </div>

    </main>

</body>
</html>
